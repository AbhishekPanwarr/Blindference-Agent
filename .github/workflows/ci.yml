name: CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build
      run: npm run build

    - name: Make CLI executable
      run: chmod +x dist/cli.js

    - name: Verify CLI executable
      run: |
        test -x dist/cli.js
        head -1 dist/cli.js | grep -q "#!/usr/bin/env node"

    - name: Check for localhost defaults
      run: |
        if grep -rn "localhost\|127\.0\.0\.1" dist/ --include="*.js"; then
          echo "ERROR: Found localhost references in dist/"
          exit 1
        fi
        echo "PASS: No localhost in dist"

    - name: Check for Math.random
      run: |
        if grep -rn "Math\.random" dist/ --include="*.js"; then
          echo "ERROR: Found Math.random in dist/"
          exit 1
        fi
        echo "PASS: No Math.random in dist"
