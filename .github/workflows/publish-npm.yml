name: Publish to npm

on:
  push:
    tags:
      - 'js-v*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22.x'
        registry-url: 'https://registry.npmjs.org'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build
      run: npm run build

    - name: Verify CLI executable
      run: |
        test -x dist/cli.js
        head -1 dist/cli.js | grep -q "#!/usr/bin/env node"

    - name: Check for localhost defaults
      run: |
        if grep -rn "localhost\|127\.0\.0\.1" dist/ --include="*.js"; then
          echo "ERROR: Found localhost references in dist/"
          exit 1
        fi
        echo "PASS: No localhost in dist"

    - name: Publish
      run: npm publish --access public
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
